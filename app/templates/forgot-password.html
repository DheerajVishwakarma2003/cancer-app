<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — OnchoLens</title>
  <link rel="stylesheet" href="/static/css/themes.css" />
  <link rel="stylesheet" href="/static/css/login.css" />
  <script src="/static/js/theme.js"></script>
</head>
<body>
<div class="auth-layout">
  <div class="auth-hero">
    <div class="hero-inner">
      <div class="hero-logo">🔒</div>
      <h1>Reset Password</h1>
      <p>Enter your new password below. Make sure it's at least 8 characters long.</p>
    </div>
  </div>

  <div class="auth-form-panel">
    <div class="auth-topbar">
      <button class="theme-toggle">🌙</button>
    </div>
    <div class="auth-card">
      <h2 style="font-family:var(--font-display);font-size:1.7rem;font-weight:800;margin-bottom:6px">
        New Password
      </h2>
      <p style="color:var(--text-2);font-size:.9rem;margin-bottom:28px">
        You must be logged in to reset your password.
      </p>

      <div id="error-banner"   class="error-banner" style="display:none"></div>
      <div id="success-banner" style="display:none;background:rgba(34,197,94,.1);
           border:1px solid rgba(34,197,94,.3);color:var(--success);
           border-radius:var(--radius-sm);padding:12px 14px;font-size:.85rem;margin-bottom:20px">
      </div>

      <form id="reset-form" novalidate>
        <div class="form-group" style="margin-bottom:14px">
          <label class="form-label">New Password</label>
          <input class="form-input" type="password" id="new-password" placeholder="••••••••" required />
        </div>
        <div class="form-group" style="margin-bottom:24px">
          <label class="form-label">Confirm Password</label>
          <input class="form-input" type="password" id="confirm-password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn btn-primary" id="submit-btn"
                style="width:100%;justify-content:center;padding:13px">
          Update Password
        </button>
      </form>

      <div style="text-align:center;margin-top:20px;font-size:.88rem;color:var(--text-2)">
        <a href="/login">← Back to login</a>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script>
(function () {
  const form      = document.getElementById("reset-form");
  const submitBtn = document.getElementById("submit-btn");
  const errBanner = document.getElementById("error-banner");
  const okBanner  = document.getElementById("success-banner");

  function showError(msg) { errBanner.textContent = msg; errBanner.style.display = "block"; okBanner.style.display = "none"; }
  function showOk(msg)    { okBanner.textContent  = msg; okBanner.style.display  = "block"; errBanner.style.display = "none"; }
  function clearAll()     { errBanner.style.display = "none"; okBanner.style.display = "none"; }

  form.addEventListener("submit", async (e) => {
    e.preventDefault(); clearAll();
    const np = document.getElementById("new-password").value;
    const cp = document.getElementById("confirm-password").value;

    if (np.length < 8)  { showError("Password must be at least 8 characters."); return; }
    if (np !== cp)      { showError("Passwords do not match."); return; }
    if (!Auth.isLoggedIn()) { showError("You must be logged in to reset your password."); return; }

    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner"></span> Updating…';

    try {
      const res  = await Auth.apiFetch("/api/auth/reset-password", {
        method: "POST",
        body: JSON.stringify({ new_password: np }),
      });
      const data = await res.json();
      if (!res.ok) { showError(data.error || "Update failed."); return; }
      showOk("✅ Password updated successfully!");
      setTimeout(() => window.location.href = "/login", 2000);
    } catch (_) { showError("Network error."); }
    finally { submitBtn.disabled = false; submitBtn.innerHTML = "Update Password"; }
  });
})();
</script>
</body>
</html>
